<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gronur Grocery System</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="split-page">
    <div class="split-left">
      <div class="cart-icon-big">🛒</div>
      <h1 style="font-size: 64px; margin-bottom: 20px;">Gronur</h1>
      <p style="font-size: 20px; max-width: 400px; opacity: 0.8;">The world's most organic grocery haven. Freshness delivered to your doorstep everyday.</p>
    </div>
    
    <div class="split-right">
      <div class="welcome-container">
        <h1>Welcome Back</h1>
        <p>Please enter your details to sign in.</p>
        
        <form action="login.php" method="post">
          <input type="text" placeholder="Username or Email" name="uname" id="uname" required>
          <input type="password" placeholder="Password" name="psw" id="psw" required>
          
          <div style="display:flex; justify-content: flex-end; width:100%; margin-top: -5px">
            <a href="#" style="color: #a0aec0; text-decoration: none; font-size: 13px; font-weight: 500;">Forgot password?</a>
          </div>
          
          <button type="submit" class="Btn">Sign In</button>
          
          <p id="account">Don't have an account? <a href="register.html">Sign up</a>.</p>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
