<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gronur Grocery System</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="split-page">
    <div class="split-left">
      <div class="cart-icon-big">🛒</div>
      <h1 style="font-size: 64px; margin-bottom: 20px;">Gronur</h1>
      <p style="font-size: 20px; max-width: 400px; opacity: 0.8;">Join thousands of shoppers who trust Gronur for their daily organic harvest.</p>
    </div>
    
    <div class="split-right">
      <div class="welcome-container">
        <h1>Create Account</h1>
        <p>Start your fresh journey with us today.</p>
        
        <form id="registerForm">
          <input type="email" placeholder="Email Address" id="email" required>
          <input type="text" placeholder="Username" id="uname" required>
          <input type="password" placeholder="Create Password" id="psw" required>
          <input type="password" placeholder="Confirm Password" id="confirm-psw" required>
          
          <button type="submit" class="Btn">Sign Up Now</button>
          
          <p id="account">Already have an account? <a href="login.html">Sign In</a>.</p>
        </form>
      </div>
    </div>
  </div>
  <script src="auth.js"></script>
</body>
</html>
